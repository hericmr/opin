image: node:20-alpine

stages:
  - test
  - build

variables:
  NODE_ENV: production
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PATH: "$CI_PROJECT_DIR/node_modules/.bin:$PATH"

cache:
  paths:
    - .npm/
    - node_modules/
  key:
    files:
      - package-lock.json

before_script:
  - npm ci --cache .npm --prefer-offline
  - echo "Node version:" && node --version
  - echo "NPM version:" && npm --version
  - echo "Vite location:" && which vite || echo "Vite not in PATH, checking node_modules..."
  - test -f node_modules/.bin/vite && echo "Vite found in node_modules/.bin/vite" || echo "Vite not found!"

test:
  stage: test
  script:
    - npm run test -- --passWithNoTests
    - npm run lint
  allow_failure: true

build:
  stage: build
  script:
    - npx vite build
  artifacts:
    paths:
      - build/
      - dist/
    expire_in: 7 days
  only:
    - main
    - develop

image: node:20

stages:
  - test
  - build

cache:
  paths:
    - node_modules/
  key:
    files:
      - package-lock.json

test:
  stage: test
  script:
    - npm ci
    - npm run test -- --passWithNoTests
    - npm run lint
  allow_failure: true

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  environment:
    name: production
  only:
    - main
    - develop

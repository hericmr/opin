image: node:20-alpine

stages:
  - test
  - build

variables:
  NODE_ENV: production

cache:
  paths:
    - node_modules/

test:
  stage: test
  script:
    - npm ci
    - npm run test -- --passWithNoTests
    - npm run lint
  allow_failure: true

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  only:
    - main
    - develop

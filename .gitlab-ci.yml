image: node:20-alpine

stages:
  - test
  - build

variables:
  NODE_ENV: production
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - .npm/
    - node_modules/
  key:
    files:
      - package-lock.json

before_script:
  - npm ci --cache .npm --prefer-offline

test:
  stage: test
  script:
    - npm run test -- --passWithNoTests
    - npm run lint
  allow_failure: true

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - build/
      - dist/
    expire_in: 7 days
  only:
    - main
    - develop
